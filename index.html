<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Rohlík.cz – Test z češtiny</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --rohlik: #f6a623; --bg: #f4f7f6; --text: #333; --success: #4caf50; --danger: #f44336; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
    
    /* Hlavička a ukazatel postupu */
    header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
    .progress { height: 6px; background: #eee; width: 150px; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--rohlik); width: 0%; transition: 0.3s ease; }
    
    /* Boxy pro obsah */
    .card { background: #fff; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 90%; max-width: 500px; margin: 20px auto; text-align: center; }
    .card-left { text-align: left; }
    h2 { margin-top: 0; }
    h3 { font-size: 18px; line-height: 1.4; margin-bottom: 20px; text-align: left; }
    
    /* Formuláře a tlačítka */
    label { font-size: 14px; font-weight: bold; color: #666; display: block; margin-top: 15px; margin-bottom: 5px; text-align: left;}
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--rohlik); color: #fff; margin-top: 20px; }
    .btn-main:active { opacity: 0.8; }
    
    .ans-btn { background: #f9f9f9; text-align: left; border: 2px solid transparent; margin-bottom: 10px; color: var(--text); width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer;}
    .ans-btn:active { background: #eee; }
    .ans-btn.selected { border: 2px solid var(--rohlik); background: #fff9f0; }
    
    #error-msg { color: var(--danger); font-size: 14px; margin-top: 15px; font-weight: bold; display: none; }
  </style>
</head>
<body>

<div id="screen-login">
  <div class="card">
    <img src="rohlik-logo.png" alt="Rohlík.cz" style="height: 50px; margin-bottom: 15px;" onerror="this.style.display='none'">
    
    <h2>Rohlík.cz<br><small style="color:#777; font-size:14px">Test češtiny pro kurýry</small></h2>
    
    <div class="card-left">
      <label>Jméno kurýra (nováček)</label>
      <input type="text" id="name-n" placeholder="Např. Jan Novák">
      
      <label>Jméno školitele</label>
      <input type="text" id="name-t" placeholder="Např. Petr Dvořák">
      
      <label>Heslo školitele</label>
      <input type="password" id="pass-t" placeholder="Zadejte heslo pro spuštění">
    </div>
    
    <div id="error-msg"></div>
    <button class="btn btn-main" onclick="start()">Spustit test</button>
  </div>
</div>

<div id="screen-test" style="display:none">
  <header>
    <div><b id="progress-text">1/20</b></div>
    <div class="progress"><div id="bar" class="progress-fill"></div></div>
  </header>
  <div class="card card-left">
    <h3 id="q-text">Načítám otázku...</h3>
    <div id="answers"></div>
    <button class="btn btn-main" id="next-btn" onclick="next()">Další otázka</button>
  </div>
</div>

<div id="screen-res" style="display:none">
  <div class="card">
    <h1 id="res-icon" style="font-size: 60px; margin: 10px 0;">✅</h1>
    <h2 id="res-score" style="font-size: 24px; margin-bottom: 5px;">0 / 0</h2>
    <p id="res-status" style="font-weight: bold; margin-bottom: 20px;"></p>
    <p style="color: #777; font-size: 13px;">Výsledek byl odeslán do Slacku a tabulky.</p>
    <button class="btn btn-main" onclick="location.reload()">Spustit nový test</button>
  </div>
</div>

<script>
// ---------- ZDE VLOŽ SVŮJ GOOGLE APPS SCRIPT URL ----------
const SCRIPT_URL = "SEM_VLOZ_ZKOPIROVANOU_URL_Z_APPS_SCRIPTU";
// ----------------------------------------------------------

// --- NASTAVENÍ TESTU A HESLA ---
const ADMIN_PASSWORD = "rohlik2026"; // TADY SI ZMĚŇ HESLO PRO ŠKOLITELE
const QUESTIONS_TO_SHOW = 20; // Kolik otázek se nováčkovi náhodně zobrazí
const PASS_PERCENT = 80;      // Kolik procent musí mít pro splnění

// BANK OTÁZEK Z PRAXE ROHLÍKU
const BANK = [
  { q: "Jak odpovíš zákazníkovi na: „Dobrý den.“?", a: ["Dobrý den.", "Dobrou noc.", "Promiňte.", "Nevím."], c: 0 },
  { q: "Co řekneš, když předáváš nákup?", a: ["Tady je váš nákup.", "To je moje.", "Zaplaťte.", "Nashledanou."], c: 0 },
  { q: "Co řekneš, když nerozumíš, co zákazník říká?", a: ["Mám hlad.", "Jdu spát.", "Prosím, zopakujte to pomalu.", "Nevím, kde jsem."], c: 2 },
  { q: "Co řekneš, když se omlouváš za chybu?", a: ["To není můj problém.", "Omlouvám se / Promiňte.", "Dobrý den.", "Je mi to jedno."], c: 1 },
  { q: "Co řekneš, když odcházíš od zákazníka?", a: ["Na shledanou, hezký den.", "Dobré ráno.", "Dobrý den.", "Prosím."], c: 0 },
  { q: "Jak slušně poprosíš zákazníka, aby chvíli počkal?", a: ["Čekej!", "Počkejte chvíli, prosím.", "Stůj tady.", "Nebuďte netrpělivý."], c: 1 },
  { q: "Co znamená, když ti zákazník řekne „Pojďte dál“?", a: ["Můžete vstoupit dovnitř.", "Musíte odejít.", "Máte zpoždění.", "Zavřete dveře."], c: 0 },
  { q: "Nemůžeš najít správný vchod. Voláš zákazníkovi. Jak začneš hovor?", a: ["Kde jste? Já jsem tady.", "Pojďte dolů, já nevím kam jít.", "Dobrý den, tady kurýr z Rohlíku. Nemohu najít váš vchod.", "Haló, otevřít!"], c: 2 },
  { q: "Máš zpoždění v koloně. Voláš zákazníkovi. Co řekneš?", a: ["Přijedu pozdě. Je tam hodně aut.", "Dobrý den, nepřijedu.", "Mám zpoždění, čekejte.", "Dobrý den, omlouvám se, zdržel jsem se v provozu. Přijedu asi za 15 minut."], c: 3 },
  { q: "Stojíš u dveří a zákazník neotevírá. Voláš mu. Co řekneš?", a: ["Tady Rohlík. Otevřít!", "Dobrý den, vezu nákup z Rohlíku, jsem u vašich dveří.", "Jdu pryč, vy tu nejste.", "Proč neotevíráte?"], c: 1 },
  { q: "Potřebuješ vědět kód od zvonku, protože ho zákazník nenapsal. Jak se zeptáš?", a: ["Dobrý den, jaký je kód ke dveřím, prosím?", "Dejte mi číslo na dveře.", "Nemám kód, co mám dělat?", "Zvonky nefungují."], c: 0 },
  { q: "Zákazník nereaguje na zvonek ani telefon. Čas vypršel. Co nahlásíš dispečinku?", a: ["Zákazník je špatný.", "Zákazník není doma a nezvedá telefon.", "Zákazník spí.", "Jdu pryč, nechce jídlo."], c: 1 },
  { q: "Zákazník do telefonu říká: „Počkejte chvilku, hned jsem dole.“ Co to znamená?", a: ["Máš odjet pryč.", "Zákazník přijde za chvíli k tobě dolů.", "Zákazník je nahoře a spí.", "Zákazník zrušil objednávku."], c: 1 },
  { q: "V poznámce je: „Nezvoňte, spí tady miminko. Nechte za dveřmi.“ Co uděláš?", a: ["Zazvoním a zeptám se kam dát tašky.", "Položím nákup u dveří a potichu odejdu.", "Zavolám zákazníkovi, že jsem dole.", "Zaklepu velmi silně."], c: 1 },
  { q: "V poznámce je: „Zavolejte mi, nefunguje zvonek.“ Co uděláš u domu?", a: ["Budu mačkat zvonek.", "Vezmu telefon a zavolám zákazníkovi.", "Nákup nechám na ulici.", "Křičím do okna."], c: 1 },
  { q: "V poznámce je: „Pozor zlý pes, nechoďte za branku.“ Co uděláš?", a: ["Otevřu branku a jdu dovnitř.", "Zavolám zákazníkovi, aby si nákup převzal u branky.", "Hodím tašky přes plot.", "Odvezu to do skladu."], c: 1 },
  { q: "V poznámce je: „Bezkontaktní doručení.“ Co to znamená?", a: ["Předat z ruky do ruky.", "Položit za dveře a odejít, nechat nákup bez osobního setkání.", "Zákazník neplatí.", "Musím se vyfotit."], c: 1 },
  { q: "Během cesty se rozbilo vajíčko. Co řekneš zákazníkovi u dveří?", a: ["Tady je nákup, něco tam teče.", "To není moje chyba.", "Moc se omlouvám, rozbilo se vejce. Hned udělám vratku v aplikaci.", "Vajíčka nemáte."], c: 2 },
  { q: "Zákazníkovi chybí položka (např. chleba), která je na účtence. Co mu řekneš?", a: ["Tady to není, smůla.", "Zavolejte si na dispečink.", "Omlouvám se, chleba asi chybí. Hned ho v aplikaci vyškrtnu a vrátíme vám peníze.", "Běžte si ho koupit jinam."], c: 2 },
  { q: "Co znamená slovo „Vratka“ v kurýrské aplikaci?", a: ["Musím se vrátit domů.", "Zákazníkovi se vrací peníze za chybějící nebo špatné zboží.", "Couvání autem.", "Vrácení tašek."], c: 1 },
  { q: "Zákazník ti nadává, protože máš 30 minut zpoždění. Jak zareaguješ?", a: ["Budu mu taky nadávat.", "Mlčky odejdu.", "Moc se omlouvám za zpoždění, byla hrozná zácpa na cestě.", "To se stává, no."], c: 2 },
  { q: "Omylem jsi přijel na špatnou adresu (o ulici vedle). Co řekneš, když tam voláš?", a: ["Kde jste?", "Omlouvám se, navigace mě zavedla vedle. Za minutu jsem u vás.", "Přijďte si pro to sem.", "Adresa je špatná."], c: 1 },
  { q: "Zákazník se ptá: „Máte u sebe terminál?“ Na co se ptá?", a: ["Jestli vím, kde je letiště.", "Jestli u sebe mám přístroj na platbu kartou.", "Jestli mám mobil.", "Jestli mám drobné na vrácení."], c: 1 },
  { q: "Zákazník má platit 350 Kč hotově, ale dává ti bankovku 2000 Kč. Nemáš na vrácení. Co řekneš?", a: ["Nemám drobné na 2000 Kč, nemáte prosím menší bankovku nebo kartu?", "Nechci ty peníze.", "Nemám, jdu pryč.", "To je moc, dejte to sem."], c: 0 },
  { q: "Jak řekneš zákazníkovi, aby přiložil kartu k terminálu?", a: ["Karta tady.", "Dejte kartu sem.", "Můžete přiložit kartu, prosím?", "Zaplaťte."], c: 2 },
  { q: "Terminál píše „Zamítnuto“. Co řekneš zákazníkovi?", a: ["Nemáte peníze.", "Platba neprošla, karta byla zamítnuta. Můžeme to zkusit znovu?", "Karta je špatná.", "Dáte mi hotovost, nebo jdu."], c: 1 },
  { q: "Kolik vracíš, když nákup stojí 420 Kč a zákazník ti dá 500 Kč?", a: ["70 Kč", "80 Kč", "90 Kč", "100 Kč"], c: 1 },
  { q: "Co znamená „vchod z boku budovy“?", a: ["Vchod je úplně nahoře.", "Vchod není z hlavní ulice, ale ze strany domu.", "Vchod je vzadu.", "Budova nemá vchod."], c: 1 },
  { q: "Co znamená dopravní značka „Zákaz vjezdu“?", a: ["Sem musím jet.", "Sem můžu zaparkovat.", "Tady je obchod.", "Sem nesmím jet s autem."], c: 3 },
  { q: "Aplikace ti ukazuje „Zpoždění 15 minut na trase“. Co to znamená pro tebe?", a: ["Jsem o 15 minut rychlejší.", "Na cestě je provoz, dorazím o 15 minut později.", "Mám přestávku 15 minut.", "Nákup je zrušen."], c: 1 }
];

let current = 0;
let score = 0;
let testSet = [];
let selected = null;

function showError(msg) {
  const errDiv = document.getElementById('error-msg');
  errDiv.innerText = msg;
  errDiv.style.display = 'block';
}

function start() {
  document.getElementById('error-msg').style.display = 'none';
  
  const n = document.getElementById('name-n').value.trim();
  const t = document.getElementById('name-t').value.trim();
  const pass = document.getElementById('pass-t').value.trim();
  
  // Kontroly vyplnění
  if (!n || !t) {
    showError("Vyplňte prosím jméno kurýra i školitele!");
    return;
  }
  
  // Kontrola hesla
  if (pass !== ADMIN_PASSWORD) {
    showError("Špatné heslo! Zkuste to znovu.");
    return;
  }
  
  // Bezpečnostní kontrola, aby bylo dost otázek
  const questionsCount = Math.min(QUESTIONS_TO_SHOW, BANK.length);
  testSet = BANK.sort(() => 0.5 - Math.random()).slice(0, questionsCount);
  
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-test').style.display = 'block';
  render();
}

function render() {
  const q = testSet[current];
  document.getElementById('q-text').innerText = q.q;
  document.getElementById('progress-text').innerText = `${current + 1} / ${testSet.length}`;
  document.getElementById('bar').style.width = `${((current) / testSet.length) * 100}%`;
  
  const nextBtn = document.getElementById('next-btn');
  nextBtn.innerText = current === testSet.length - 1 ? "Dokončit test" : "Další otázka";
  
  const div = document.getElementById('answers');
  div.innerHTML = "";
  selected = null;
  
  q.a.forEach((txt, i) => {
    const b = document.createElement("button");
    b.className = "ans-btn";
    b.innerText = txt;
    b.onclick = () => {
      document.querySelectorAll('.ans-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selected = i;
    };
    div.appendChild(b);
  });
}

function next() {
  if (selected === null) {
    alert("Vyberte prosím odpověď!");
    return;
  }
  
  if (selected === testSet[current].c) score++;
  
  if (current < testSet.length - 1) {
    current++;
    render();
  } else {
    finish();
  }
}

function finish() {
  document.getElementById('bar').style.width = `100%`;
  const perc = Math.round((score / testSet.length) * 100);
  const passed = perc >= PASS_PERCENT;
  
  document.getElementById('screen-test').style.display = 'none';
  document.getElementById('screen-res').style.display = 'block';
  
  document.getElementById('res-score').innerText = `${score} / ${testSet.length} (${perc} %)`;
  
  const resStatus = document.getElementById('res-status');
  const resIcon = document.getElementById('res-icon');
  
  if (passed) {
    resStatus.innerText = "Úspěšně jsi prošel(a)!";
    resStatus.style.color = "var(--success)";
    resIcon.innerText = "🎉";
  } else {
    resStatus.innerText = `Neprošel(a) jsi. Potřebuješ alespoň ${PASS_PERCENT} %.`;
    resStatus.style.color = "var(--danger)";
    resIcon.innerText = "❌";
  }

  // Odeslání do Googlu a Slacku
  const payload = {
    noviceName: document.getElementById('name-n').value.trim(),
    trainerName: document.getElementById('name-t').value.trim(),
    score: score,
    total: testSet.length,
    percent: perc,
    passed: passed
  };

  if (SCRIPT_URL.includes("script.google.com")) {
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(err => console.log("Chyba odesílání:", err));
  }
}
</script>
</body>
</html>
