<!DOCTYPE html>
<html lang="cs" translate="no">
<head>
    <meta charset="UTF-8">
    <title>Rohlík.cz – Vstupní test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="google" content="notranslate">
    <style>
        :root {
            --rohlik: #f6a623; --rohlik-glow: rgba(246, 166, 35, 0.4);
            --bg: #0f172a; --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc; --text-muted: #94a3b8;
            --success: #2ecc71; --danger: #e74c3c;
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }

        /* GLASSMORPHISM CARD */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%; max-width: 480px;
            margin: auto; transition: 0.4s;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .q-timer-ring {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--rohlik);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 4px;
            background: var(--rohlik); transition: 0.3s;
            box-shadow: 0 0 15px var(--rohlik); z-index: 101;
        }

        h2 { font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 30px; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--rohlik); background: rgba(255,255,255,0.1); }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--rohlik); color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .ans-btn {
            width: 100%; padding: 18px; margin-bottom: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; color: var(--text); text-align: left;
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .ans-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .ans-btn.selected { border-color: var(--rohlik); background: var(--rohlik-glow); }

        #error-msg { color: var(--danger); text-align: center; font-weight: bold; margin: 10px 0; display: none; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .low-time { color: var(--danger); animation: pulse 1s infinite; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="progress" class="progress-bar"></div>

<header id="main-header" style="display:none;">
    <img src="rohlik-logo.png" style="height:25px;" onerror="this.style.display='none'">
    <div style="display:flex; gap:15px; align-items:center;">
        <div id="q-timer" class="q-timer-ring">45</div>
        <div id="q-idx" style="font-weight:bold; color:var(--text-muted)">1/25</div>
    </div>
</header>

<div class="container" style="flex:1; display:flex;">
    <div id="screen-login" class="glass-card">
        <h2>Vstupní test</h2>
        <input type="text" id="name-n" placeholder="Jméno kurýra">
        <input type="text" id="name-t" placeholder="Jméno trenéra">
        <input type="password" id="pass-t" placeholder="Heslo trenéra">
        <div id="error-msg"></div>
        <button class="btn-main" id="btn-start" onclick="startTest()">Spustit test</button>
    </div>

    <div id="screen-test" class="glass-card" style="display:none">
        <h3 id="q-text" style="line-height:1.4"></h3>
        <div id="answers"></div>
        <button class="btn-main" id="btn-next" onclick="nextQuestion()" disabled>Další otázka</button>
    </div>

    <div id="screen-res" class="glass-card" style="display:none; text-align:center;">
        <div id="res-icon" style="font-size:60px"></div>
        <h2 id="res-score"></h2>
        <p id="res-status" style="font-size:18px; font-weight:bold;"></p>
        <button class="btn-main" onclick="location.reload()">Nový test</button>
    </div>
</div>

<script>
// --- KONFIGURACE ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylbGGi498B00Tyjrjhlo1FUJKPbWCr8QYsOX1cNUvav7inqfGAkvG-WExKolS0SmmE6A/exec";
const HASHED_PASS = "cm9obGlrMjAyNg==";
const Q_LIMIT = 25;
const SECONDS_PER_Q = 45;
const MAX_ERRORS = 5;

// --- BANKA OTÁZEK ---
const NAMES = ["p. Novák", "p. Svoboda", "p. Dvořák", "p. Černý", "p. Kučera", "p. Marek"];
const BANK = [
    { cat: "Procesy", q: "Auto nestartuje nebo máš defekt. Komu zavoláš?", a: ["Technikům", "Podpoře", "KKS", "Nikoho"], c: 0 },
    { cat: "Procesy", q: "Zákazník chce reklamovat jablka. Co uděláš?", a: ["Odkážu ho na Zákaznickou podporu", "Zavolám techniky", "Nic", "Dám mu slevu"], c: 0 },
    { cat: "Komunikace", q: "Jak pozdravíš {name} u dveří?", a: ["Dobrý den", "Ahoj", "Co chceš?", "Tady to je"], c: 0 },
    { cat: "Platby", q: "Terminál hlásí 'Zamítnuto'. Co řekneš?", a: ["Omlouvám se, platba neprošla. Zkusíme to znovu?", "Nemáte peníze", "Zaplaťte hotově", "Odjíždím"], c: 0 },
    { cat: "Procesy", q: "Zapomněl jsi PIN k tankovací kartě. Komu voláš?", a: ["Správci vybavení", "Technikům", "KKS", "Podpoře"], c: 0 },
    { cat: "Procesy", q: "Máš zpoždění na trase. S kým to řešíš?", a: ["S KKS", "S Techniky", "Se Správcem", "S nikým"], c: 0 },
    { cat: "Pravidla", q: "V nákupu je alkohol a u dveří je dítě. Co uděláš?", a: ["Alkohol stornuji nebo předám jen dospělému s OP", "Dám mu to", "Nechám to tam", "Zavolám policii"], c: 0 },
    { cat: "Pravidla", q: "Co znamená značka Zákaz zastavení?", a: ["Nesmím tam zastavit ani pro vyložení nákupu", "Můžu tam stát 5 min", "Můžu tam stát na blikačky", "Nevím"], c: 0 }
    // ... sem přidej zbytek svých 100+ otázek
];

let state = {
    current: 0, score: 0, testSet: [], selected: null,
    tabSwitches: 0, startTime: 0, qStartTime: 0,
    history: [], hesitancy: []
};

// --- LOGIKA ---

// Ochrana proti podvádění (Tab Switch)
document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.testSet.length > 0) {
        state.tabSwitches++;
        console.log("Cheat detection: Tab switched");
    }
});

function startTest() {
    const n = document.getElementById('name-n').value.trim();
    const t = document.getElementById('name-t').value.trim();
    const p = document.getElementById('pass-t').value.trim();
    
    if (!n || !t) { alert("Vyplň jména!"); return; }
    if (btoa(p) !== HASHED_PASS) { alert("Špatné heslo!"); return; }

    // Výběr a míchání otázek
    state.testSet = BANK.sort(() => 0.5 - Math.random()).slice(0, Q_LIMIT);
    state.startTime = Date.now();
    
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('screen-test').style.display = 'block';
    
    renderQuestion();
}

let qTimer;
function renderQuestion() {
    clearInterval(qTimer);
    const q = state.testSet[state.current];
    const name = NAMES[Math.floor(Math.random() * NAMES.length)];
    
    document.getElementById('q-text').innerText = q.q.replace("{name}", name);
    document.getElementById('q-idx').innerText = `${state.current + 1}/${Q_LIMIT}`;
    document.getElementById('progress').style.width = `${(state.current / Q_LIMIT) * 100}%`;
    document.getElementById('btn-next').disabled = true;
    
    // Míchání odpovědí (Bod 2)
    const ansDiv = document.getElementById('answers');
    ansDiv.innerHTML = "";
    state.selected = null;
    
    let answers = q.a.map((t, i) => ({ t, i }));
    answers.sort(() => 0.5 - Math.random());
    
    answers.forEach(obj => {
        const b = document.createElement('button');
        b.className = "ans-btn";
        b.innerText = obj.t;
        b.onclick = () => {
            if (Date.now() - state.qStartTime < 1000) return; // Ochrana proti rychlému klikání (Bod 29)
            document.querySelectorAll('.ans-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
            state.selected = obj.i;
            document.getElementById('btn-next').disabled = false;
        };
        ansDiv.appendChild(b);
    });

    // Otázkový časovač (Bod 12)
    let sec = SECONDS_PER_Q;
    state.qStartTime = Date.now();
    const timerDiv = document.getElementById('q-timer');
    timerDiv.innerText = sec;
    timerDiv.classList.remove('low-time');

    qTimer = setInterval(() => {
        sec--;
        timerDiv.innerText = sec;
        if (sec <= 10) timerDiv.classList.add('low-time');
        if (sec <= 0) {
            clearInterval(qTimer);
            nextQuestion(true); // Automatický posun při vypršení času
        }
    }, 1000);
}

function nextQuestion(isTimeout = false) {
    const q = state.testSet[state.current];
    const timeSpent = (Date.now() - state.qStartTime) / 1000;
    
    // Záznam váhání (Bod 46)
    if (timeSpent > 30) state.hesitancy.push(q.cat);

    if (!isTimeout && state.selected === q.c) state.score++;
    
    state.history.push({ cat: q.cat, correct: !isTimeout && state.selected === q.c });

    if (state.current < Q_LIMIT - 1) {
        state.current++;
        renderQuestion();
    } else {
        finish();
    }
}

function finish() {
    clearInterval(qTimer);
    const passed = state.score >= (Q_LIMIT - MAX_ERRORS);
    const perc = Math.round((state.score / Q_LIMIT) * 100);
    
    // Výpočet kategorií pro Slack (Bod 16 & 48)
    let catResults = {};
    state.history.forEach(h => {
        if (!catResults[h.cat]) catResults[h.cat] = { correct: 0, total: 0 };
        catResults[h.cat].total++;
        if (h.correct) catResults[h.cat].correct++;
    });

    document.getElementById('screen-test').style.display = 'none';
    document.getElementById('main-header').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    document.getElementById('screen-res').style.display = 'block';

    document.getElementById('res-score').innerText = `${state.score} / ${Q_LIMIT}`;
    document.getElementById('res-icon').innerText = passed ? "🎉" : "❌";
    document.getElementById('res-status').innerText = passed ? "SKVĚLÉ, PROŠEL(A) JSI!" : "BOHUŽEL, TO NESTAČÍ.";

    // Odeslání dat
    const payload = {
        noviceName: document.getElementById('name-n').value,
        trainerName: document.getElementById('name-t').value,
        score: state.score,
        total: Q_LIMIT,
        percent: perc,
        passed: passed,
        tabSwitches: state.tabSwitches,
        avgTimePerQ: Math.round((Date.now() - state.startTime) / Q_LIMIT / 1000),
        hesitancyNotes: [...new Set(state.hesitancy)].join(", "),
        categoryResults: catResults
    };

    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
}
</script>
</body>
</html>
